version: 2

sources:
  - name: airbnb
    schema: STAGING

    tables:
      - name: listings
        identifier: listings

      - name: hosts
        identifier: hosts

      - name: reviews
        identifier: reviews
        loaded_at_field: "date::timestamp"

        freshness:
          warn_after:
            count: 1
            period: hour
          # error_after:
          #   count: 1
          #   period: hour
