
## Note: 4 Built in generic Tests: Unique, Not Null, Relationships,Accepted Values

models:
  - name: dim_listings_cleansed
    data_tests:
      - minimum_row_count:
            min_row_count: 1000000
            severity: error

    columns:
      - name: listing_id
        data_tests:
          - unique
          - not_null
      
      - name: host_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_hosts_cleansed')
              field: host_id

      - name: room_type
        data_tests:
          - accepted_values:
              values: ['Entire home/apt','Private room','Shared room','Hotel room']

      - name: minimum_nights
        data_tests:
          - positive_values
## add dtaa contracts here which is just a normal mopdel definition
  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: string
      - name: host_name
        data_type: string
      - name: is_superhost
        data_type: string
      - name: created_date
        data_type: timestamp
      - name: updated_date
        data_type: timestamp
